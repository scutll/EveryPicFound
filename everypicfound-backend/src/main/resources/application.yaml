spring:
  application:
    name: everypicfound-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mysql://localhost:3307/everypicfound?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

everypicfound:
  storage:
    base-path: ./data/images
    access-url-prefix: /images
    max-file-size: 10485760 # 10MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp

  vector-index:
    active-collection-name: CLIP_v1
    collections:
      CLIP_v1:
        collection-name: CLIP_v1
        model-name: clip-ViT-32B
        vector-dim: 512
        vector-version: v1
        distance-metric: COSINE
    qdrant:
      host: 127.0.0.1
      port: 6334
      use-tls: false
      timeout-ms: 10000
      
  vectorization:
    max-retry-count: 3
    processing-timeout-seconds: 300
    publish-mode: THREAD_POOL
    scanner-enabled: false
    pending-scan-batch-size: 100