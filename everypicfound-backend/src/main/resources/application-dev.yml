spring:
  datasource:
    url: jdbc:mysql://localhost:3306/everypicfound?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

everypicfound:
  storage:
    base-path: ./data/images
    access-url-prefix: /images
    max-file-size: 10485760 # 10MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp

  model-client:
    base-url: http://127.0.0.1:8001
    image-vectorize-path: /vectorize/image
    text-vectorize-path: /vectorize/text
    health-path: /health
    connect-timeout-ms: 3000
    read-timeout-ms: 60000
    default-model-name: clip