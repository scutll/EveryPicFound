spring:
  application:
    name: everypicfound-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mysql://localhost:3307/everypicfound?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      connect-timeout: 2s
      timeout: 1s
      repositories:
        enabled: false


mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

everypicfound:
  storage:
    base-path: ./data/images
    access-url-prefix: /images
    max-file-size: 10485760 # 10MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp

  vector-index:
    active-collection-name: CLIP_v1
    collections:
      CLIP_v1:
        collection-name: CLIP_v1
        model-name: clip-ViT-32B
        vector-dim: 512
        vector-version: v1
        distance-metric: COSINE
    qdrant:
      host: 127.0.0.1
      port: 6334
      use-tls: false
      timeout-ms: 10000
      
  vectorization:
    max-retry-count: 3
    processing-timeout-seconds: 300
    publish-mode: THREAD_POOL
    scanner-enabled: false
    pending-scan-batch-size: 100

    hybrid-fusion:
      image-weight: 0.5
      text-weight: 0.5
      normalize-enabled: true

  system-health:
    scheduled-enabled: true
    check-interval-ms: 60000
    initial-delay-ms: 30000
    startup-fail-fast: false

  search:
    default-top-k: 30
    max-top-k: 50
    over-fetch-ratio: 3
    max-top-n: 200
    rerank-enabled: false
    cache-enabled: false
    max-query-text-length: 500

  cache:
    enabled: true
    ttl-seconds: 300
    key-prefix: epf:dev

    